<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 爱心烟花</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 30%, #16213e 60%, #0f3460 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .title {
            font-size: 3rem;
            color: #ff6b9d;
            text-shadow: 0 0 40px rgba(255, 107, 157, 0.6), 0 0 80px rgba(102, 126, 234, 0.4);
            margin-bottom: 20px;
            animation: titleGlow 3s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 40px rgba(255, 107, 157, 0.6), 0 0 80px rgba(102, 126, 234, 0.4); }
            50% { text-shadow: 0 0 80px rgba(255, 107, 157, 0.9), 0 0 120px rgba(102, 126, 234, 0.6); }
        }
        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        .counter {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 107, 157, 0.6);
            font-size: 0.85rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.3);
        }
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            animation: fadeHint 2s ease-in-out infinite;
        }
        @keyframes fadeHint {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <canvas id="heartCanvas"></canvas>
    </div>
    
    <div class="container">
        <h1 class="title">💖 爱心烟花</h1>
        <p class="subtitle">点击屏幕释放爱心烟花</p>
    </div>
    
    <div class="hint">✨ 点击屏幕看爱心烟花 ✨</div>
    <div class="counter">💖 访客 <span id="vc-heart">...</span> 人</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        let hearts = [];
        let particles = [];
        let animationId = null;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 创建星空背景
        function createStars() {
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 60 + '%';
                star.style.width = (1 + Math.random() * 2) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(star);
            }
        }
        createStars();
        
        function heartEquation(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x, y };
        }
        
        function createHeart(x, y) {
            return {
                x: x,
                y: y,
                progress: 0,
                size: Math.min(window.innerWidth, window.innerHeight) * 0.35,
                speed: 0.012 + Math.random() * 0.006,
                color: `hsl(${330 + Math.random() * 30}, 85%, ${55 + Math.random() * 15}%)`,
                phase: 'drawing', // drawing, complete, exploding
                explodeTime: 0
            };
        }
        
        function drawHeart(heart) {
            ctx.save();
            ctx.translate(heart.x, heart.y);
            ctx.scale(heart.size / 20, heart.size / 20);
            ctx.rotate(Math.PI);
            
            // 绘制发光层
            ctx.shadowColor = heart.color;
            ctx.shadowBlur = 20;
            
            ctx.beginPath();
            const points = [];
            
            for (let t = 0; t <= heart.progress * Math.PI * 2; t += 0.015) {
                const pos = heartEquation(t);
                points.push(pos);
            }
            
            if (points.length > 1) {
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
            }
            
            ctx.strokeStyle = heart.color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            
            // 内部填充（绘制完成后）
            if (heart.progress >= 0.95) {
                ctx.fillStyle = heart.color + '40';
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function createExplosion(heart) {
            const burstColors = [heart.color, '#ff8fab', '#ffcdd2', '#ffeaa7', '#ff7675', '#a29bfe'];
            
            // 创建大量粒子
            for (let i = 0; i < 100; i++) {
                const angle = Math.random() * Math.PI * 2;
                const velocity = 3 + Math.random() * 8;
                const size = 4 + Math.random() * 8;
                
                particles.push({
                    x: heart.x + (Math.random() - 0.5) * heart.size * 0.5,
                    y: heart.y + (Math.random() - 0.5) * heart.size * 0.5,
                    vx: Math.cos(angle) * velocity,
                    vy: Math.sin(angle) * velocity,
                    size: size,
                    color: burstColors[Math.floor(Math.random() * burstColors.length)],
                    life: 1,
                    type: 'burst'
                });
            }
            
            // 创建爱心粒子
            for (let i = 0; i < 20; i++) {
                particles.push({
                    x: heart.x,
                    y: heart.y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: -Math.random() * 8 - 2,
                    size: 15 + Math.random() * 20,
                    color: heart.color,
                    life: 1,
                    type: 'heart'
                });
            }
            
            // 创建闪光粒子
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: heart.x + (Math.random() - 0.5) * heart.size * 0.3,
                    y: heart.y + (Math.random() - 0.5) * heart.size * 0.3,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 3 - 1,
                    size: 3 + Math.random() * 4,
                    color: '#fff',
                    life: 1,
                    type: 'sparkle'
                });
            }
        }
        
        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.type === 'burst') {
                    p.vy += 0.15; // 重力
                    p.vx *= 0.99; // 阻力
                } else if (p.type === 'heart') {
                    p.vy += 0.08;
                    p.vx *= 0.98;
                }
                
                p.life -= 0.015;
                
                if (p.life > 0) {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    
                    if (p.type === 'heart') {
                        // 绘制爱心
                        ctx.font = p.size * p.life + 'px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('💖', p.x, p.y);
                    } else {
                        // 绘制圆形粒子
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.shadowColor = p.color;
                        ctx.shadowBlur = 15;
                        ctx.fill();
                    }
                    
                    ctx.restore();
                    return true;
                }
                return false;
            });
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            hearts = hearts.filter(heart => {
                if (heart.phase === 'drawing') {
                    heart.progress += heart.speed;
                    drawHeart(heart);
                    
                    // 绘制过程中的小火花
                    if (Math.random() > 0.92) {
                        const t = heart.progress * Math.PI * 2 * 0.7;
                        const pos = heartEquation(t);
                        particles.push({
                            x: heart.x + pos.x * (heart.size / 20),
                            y: heart.y - pos.y * (heart.size / 20),
                            vx: (Math.random() - 0.5) * 3,
                            vy: -Math.random() * 2 - 1,
                            size: 3 + Math.random() * 3,
                            color: heart.color,
                            life: 0.8,
                            type: 'sparkle'
                        });
                    }
                    
                    if (heart.progress >= 1) {
                        heart.phase = 'complete';
                        heart.explodeTime = Date.now();
                    }
                } else if (heart.phase === 'complete') {
                    // 停留片刻后爆炸
                    drawHeart(heart);
                    
                    // 完成时的闪烁效果
                    const flash = Math.sin((Date.now() - heart.explodeTime) / 100) * 0.3 + 0.7;
                    ctx.save();
                    ctx.globalAlpha = flash;
                    drawHeart(heart);
                    ctx.restore();
                    
                    if (Date.now() - heart.explodeTime > 800) {
                        createExplosion(heart);
                        heart.phase = 'exploding';
                    }
                } else {
                    // 爆炸阶段，等待粒子消失
                    if (heart.explodeTime === 0) {
                        heart.explodeTime = Date.now();
                    }
                    return Date.now() - heart.explodeTime < 3000;
                }
                
                return true;
            });
            
            updateParticles();
            
            animationId = requestAnimationFrame(animate);
        }
        
        // 访客计数器
        fetch('https://api.countapi.xyz/hit/hr-platform/heart-fireworks')
            .then(r => r.json())
            .then(d => { document.getElementById('vc-heart').textContent = d.value; })
            .catch(() => { document.getElementById('vc-heart').textContent = '✨'; });

        animate();
        
        document.addEventListener('click', (e) => {
            const heart = createHeart(e.clientX, e.clientY);
            hearts.push(heart);
        });
    </script>
</body>
</html>
