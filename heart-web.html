<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ 全世界最帅的狮狮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
  overflow: hidden;
}
canvas {
  display: block;
  border-radius: 16px;
  box-shadow: 0 0 60px rgba(255,107,157,0.3);
  max-width: 100vw;
  max-height: 80vh;
}
.title {
  color: #fff;
  font-size: 24px;
  margin-bottom: 20px;
  text-align: center;
}
.title span { color: #ff6b9d; }
.subtitle {
  color: #636e72;
  font-size: 14px;
  margin-top: 16px;
  text-align: center;
}
.controls {
  margin-top: 16px;
  display: flex;
  gap: 10px;
}
.controls button {
  background: rgba(255,107,157,0.2);
  border: 1px solid rgba(255,107,157,0.4);
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  transition: all .3s;
}
.controls button:hover {
  background: rgba(255,107,157,0.4);
}
.controls button.active {
  background: #ff6b9d;
  border-color: #ff6b9d;
}
</style>
</head>
<body>
<div class="title">❤️ <span>全世界最帅的狮狮</span></div>
<canvas id="canvas"></canvas>
<div class="controls">
  <button class="active" onclick="switchMode('draw')">🎨 绘制</button>
  <button onclick="switchMode('pulse')">💗 跳动</button>
  <button onclick="switchMode('particles')">✨ 粒子</button>
</div>
<div class="subtitle" id="modeLabel">🖌️ 正在绘制爱心...</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, scale;
let mode = 'draw';
let time = 0;
let particles = [];
let drawProgress = 0;
let heartPoints = [];

function resize() {
  const maxW = window.innerWidth * 0.9;
  const maxH = window.innerHeight * 0.75;
  const size = Math.min(maxW, maxH, 600);
  canvas.width = size * devicePixelRatio;
  canvas.height = size * devicePixelRatio;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  W = canvas.width;
  H = canvas.height;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  W = size;
  H = size;
  scale = size / 400;

  heartPoints = [];
  for (let t = 0; t <= Math.PI * 2; t += 0.02) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    heartPoints.push({
      x: W/2 + x * scale * 10,
      y: H/2 - y * scale * 8 - 10 * scale
    });
  }
}
resize();
window.addEventListener('resize', resize);

function switchMode(m) {
  mode = m;
  time = 0;
  drawProgress = 0;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  if (m === 'draw') drawProgress = 0;
  event.target.classList.add('active');
  const labels = { 'draw': '🖌️ 正在绘制爱心...', 'pulse': '💗 爱心跳动中...', 'particles': '✨ 粒子爱心...' };
  document.getElementById('modeLabel').textContent = labels[m];
  if (m === 'particles') initParticles();
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 200; i++) {
    const p = heartPoints[Math.floor(Math.random() * heartPoints.length)];
    particles.push({
      x: p.x, y: p.y,
      ox: p.x, oy: p.y,
      size: 1 + Math.random() * 2,
      hue: 340 + Math.random() * 30,
      phase: Math.random() * Math.PI * 2
    });
  }
}

const HEART_TEXT = '❤️  全世界最帅的狮狮  ❤️';

function drawHeart(ctx, progress, offsetX, offsetY, color) {
  const count = Math.floor(heartPoints.length * progress);
  ctx.beginPath();
  ctx.moveTo(heartPoints[0].x + offsetX, heartPoints[0].y + offsetY);
  for (let i = 1; i < count; i++) {
    ctx.lineTo(heartPoints[i].x + offsetX, heartPoints[i].y + offsetY);
  }
  ctx.closePath();
  ctx.fillStyle = color || '#ff6b9d';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawPulse(ctx, t) {
  const beat = Math.abs(Math.sin(t * 3));
  const pulse = 1 + beat * 0.08;
  ctx.save();
  ctx.translate(W/2 * (1 - pulse), H/2 * (1 - pulse));
  ctx.scale(pulse, pulse);
  drawHeart(ctx, 1, 0, 0, '#ff6b9d');
  ctx.restore();
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 80 * scale);
  glow.addColorStop(0, `rgba(255,107,157,${0.15 * beat})`);
  glow.addColorStop(1, 'rgba(255,107,157,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
}

function drawParticles(ctx, t) {
  ctx.fillStyle = 'rgba(26,26,46,0.3)';
  ctx.fillRect(0, 0, W, H);
  particles.forEach((p) => {
    const targetX = p.x + Math.sin(t * 0.5 + p.phase) * 20 * scale;
    const targetY = p.y + Math.cos(t * 0.5 + p.phase) * 20 * scale;
    p.x += (targetX - p.x) * 0.05;
    p.y += (targetY - p.y) * 0.05;
    const alpha = 0.5 + Math.sin(t + p.phase) * 0.3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * scale, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${alpha})`;
    ctx.fill();
  });
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = `bold ${24 * scale}px "PingFang SC", "Microsoft YaHei", Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(HEART_TEXT, W/2, H/2 + 60 * scale);
}

function animate() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  time += 0.016;

  if (mode === 'draw') {
    drawProgress = Math.min(1, drawProgress + 0.008);
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#ff6b9d');
    grad.addColorStop(1, '#ee5a24');
    drawHeart(ctx, drawProgress, 0, 0, grad);
    if (drawProgress >= 0.8) {
      const ta = Math.min(1, (drawProgress - 0.8) * 5);
      ctx.fillStyle = `rgba(255,255,255,${ta})`;
      ctx.font = `bold ${20 * scale}px "PingFang SC", "Microsoft YaHei", Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(HEART_TEXT, W/2, H/2 + 60 * scale);
    }
  } else if (mode === 'pulse') {
    drawPulse(ctx, time);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = `bold ${20 * scale}px "PingFang SC", "Microsoft YaHei", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(HEART_TEXT, W/2, H/2 + 60 * scale);
  } else if (mode === 'particles') {
    drawParticles(ctx, time);
  }

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
