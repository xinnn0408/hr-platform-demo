<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ 全世界最帅的狮狮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0d1a;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
  overflow: hidden;
  user-select: none;
}
canvas {
  display: block;
  max-width: 100vw;
  max-height: 100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H, t = 0, pts = [], mode = 'draw', progress = 0;

function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight);
  W = c.width = window.innerWidth * devicePixelRatio;
  H = c.height = window.innerHeight * devicePixelRatio;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  generateHeart(s / 400);
}
resize();
window.addEventListener('resize', resize);

function generateHeart(s) {
  pts = [];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2 - 40 * s;
  for (let a = 0; a <= Math.PI * 2; a += 0.02) {
    const x = 16 * Math.pow(Math.sin(a), 3);
    const y = 13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a);
    pts.push({ x: cx + x * s * 11, y: cy - y * s * 8.5 });
  }
}

function draw(t) {
  W2 = window.innerWidth; H2 = window.innerHeight;
  ctx.clearRect(0, 0, W2, H2);
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W2, H2);

  progress = Math.min(1, progress + 0.005);
  const count = Math.floor(pts.length * progress);
  const s = Math.min(window.innerWidth, window.innerHeight) / 400;

  if (count > 1) {
    // Glow
    ctx.shadowColor = '#ff6b9d';
    ctx.shadowBlur = 30;

    // Gradient fill
    const grad = ctx.createRadialGradient(W2/2, H2/2 - 20*s, 0, W2/2, H2/2 - 20*s, 100*s);
    grad.addColorStop(0, '#ff9bbf');
    grad.addColorStop(0.5, '#ff6b9d');
    grad.addColorStop(1, '#ee5a24');
    ctx.fillStyle = grad;

    // Draw heart with taper effect
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < count; i++) {
      const prev = pts[i - 1];
      const midX = (prev.x + pts[i].x) / 2;
      const midY = (prev.y + pts[i].y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, midX, midY);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Sparkle edges
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Particles floating
  if (progress > 0.3) {
    const pCount = Math.floor(progress * 30);
    for (let i = 0; i < pCount; i++) {
      const pi = Math.floor(Math.random() * pts.length);
      const px = pts[pi].x + (Math.random() - 0.5) * 60 * s;
      const py = pts[pi].y + (Math.random() - 0.5) * 60 * s;
      const size = Math.random() * 2 + 1;
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 155, 191, ${Math.random() * 0.4 + 0.1})`;
      ctx.fill();
    }
  }

  // Text when heart is complete enough
  if (progress > 0.75) {
    const alpha = Math.min(1, (progress - 0.75) * 8);
    const glow = `rgba(255, 107, 157, ${alpha * 0.2})`;
    ctx.shadowColor = glow;
    ctx.shadowBlur = 20;

    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.font = `bold ${28 * s}px "PingFang SC", "Microsoft YaHei", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('❤️  全世界最帅的狮狮  ❤️', W2 / 2, H2 / 2 + 95 * s);

    ctx.shadowBlur = 0;
  }

  requestAnimationFrame(draw);
}
draw();

// Click to switch mode
document.addEventListener('click', () => {
  if (mode === 'draw') {
    mode = 'pulse';
    progress = 1;
  } else if (mode === 'pulse') {
    mode = 'draw';
    progress = 0;
  }
});
</script>
</body>
</html>
